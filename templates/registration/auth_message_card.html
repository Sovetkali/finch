<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} — Finch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border: none; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="text-center mb-4">
                    <h1 class="h3 fw-bold text-dark mb-1">🐦 Finch</h1>
                    <p class="text-muted">{{ subtitle }}</p>
                </div>
                <div class="card auth-card">
                    <div class="card-body p-4 p-sm-5 text-center">
                        <h3 class="fw-bold mb-3">{{ title }}</h3>
                        <p class="text-muted">{{ subtitle }}</p>
                        <a href="{% url link_url %}" class="btn btn-success px-4 py-2 fw-semibold">{{ link_text }}</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
